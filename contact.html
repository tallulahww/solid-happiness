<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title> <3 what the album? — contact <3 </title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:#fff;color:#000;font-family:'Courier Prime','Courier New',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:3rem 1.5rem 6rem;}
.hed{font-size:13px;letter-spacing:0.18em;text-transform:lowercase;margin-bottom:3rem;align-self:flex-start;max-width:520px;width:100%;margin-left:auto;margin-right:auto;}
.hed a{color:#aaa;text-decoration:none;}
.hed a:hover{color:#000;}
.wrap{width:100%;max-width:520px;display:flex;flex-direction:column;gap:1.6rem;}
.intro{font-size:13px;line-height:1.7;color:#555;font-style:italic;}
.form{display:flex;flex-direction:column;gap:1.2rem;}
.field{display:flex;flex-direction:column;gap:6px;}
label{font-size:10px;letter-spacing:0.14em;text-transform:lowercase;color:#aaa;}
input,textarea{font-family:'Courier Prime','Courier New',monospace;font-size:13px;color:#000;background:#fff;border:1px solid #000;padding:11px 14px;outline:none;width:100%;resize:none;}
input::placeholder,textarea::placeholder{color:#bbb;font-style:italic;}
input:focus,textarea:focus{border-color:#000;}
textarea{min-height:140px;}
.sub-btn{background:#000;color:#fff;border:none;padding:13px 20px;font-family:'Courier Prime',monospace;font-size:13px;letter-spacing:0.08em;cursor:pointer;align-self:flex-start;transition:opacity 0.15s;}
.sub-btn:hover{opacity:0.75;}
.sub-btn:disabled{background:#ccc;cursor:not-allowed;opacity:1;}
.success{display:none;font-size:13px;font-style:italic;color:#555;padding:1.2rem;border:1px solid #000;}
.back{font-size:11px;letter-spacing:0.12em;color:#aaa;text-decoration:underline;text-underline-offset:3px;cursor:pointer;background:none;border:none;font-family:'Courier Prime',monospace;}
.back:hover{color:#000;}
@media(max-width:480px){body{padding:2rem 1rem 5rem;}}
</style>
</head>
<body>
<div class="hed"><a href="index.html">← what the album?</a></div>
<div class="wrap">
  <p class="intro">say hi, tell me what you think, suggest an album, report a bug — whatever you like.</p>
  <div data-fs-success style="display:none;" class="success" id="success">got it — thanks for reaching out! i'll get back to you soon.</div>
  <div data-fs-error style="display:none;font-size:11px;color:#999;font-style:italic;margin-bottom:0.5rem;"></div>
  <form class="form" id="contactForm">
    <div class="field">
      <label for="name">name</label>
      <input type="text" id="name" name="name" placeholder="your name..." autocomplete="off" data-fs-field/>
    </div>
    <div class="field">
      <label for="email">email</label>
      <input type="email" id="email" name="email" placeholder="your email..." required autocomplete="off" data-fs-field/>
      <span data-fs-error="email" style="font-size:11px;color:#999;font-style:italic;"></span>
    </div>
    <div class="field">
      <label for="message">message</label>
      <textarea id="message" name="message" placeholder="what's on your mind..." required data-fs-field></textarea>
      <span data-fs-error="message" style="font-size:11px;color:#999;font-style:italic;"></span>
    </div>
    <button type="submit" class="sub-btn" data-fs-submit-btn>send</button>
  </form>
</div>

<script>
  window.formspree = window.formspree || function () { (formspree.q = formspree.q || []).push(arguments); };
  formspree('initForm', { formElement: '#contactForm', formId: 'xeebjwpp' });
</script>
<script src="https://unpkg.com/@formspree/ajax@1" defer></script>
</body>
</html>
