<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Guess The Album</title>

<style>

body{
font-family:Arial,sans-serif; 
background:#111;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.container{
text-align:center;
max-width:600px;
padding:20px;
}

img{
width:300px;
height:300px;
object-fit:cover;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,.5);
}

input{
margin-top:20px;
padding:12px;
width:300px;
font-size:16px;
}

button{
padding:12px 20px;
margin:10px;
font-size:16px;
cursor:pointer;
}

#result{
margin-top:20px;
font-size:20px;
}

</style>

</head>

<body>

<div class="container">

<h1>Guess The Album</h1>

<img id="cover" src="">

<br>

<input id="guess" placeholder="Album name">

<br>

<button onclick="checkGuess()">Guess</button>

<div id="result"></div>

</div>

<script>

const albums = [

{artist:"Frank Ocean",album:"Blonde"},
{artist:"Radiohead",album:"OK Computer"},
{artist:"Fleetwood Mac",album:"Rumours"},
{artist:"The Beatles",album:"Abbey Road"},
{artist:"Taylor Swift",album:"folklore"},
{artist:"Mitski",album:"Puberty 2"},
{artist:"Kendrick Lamar",album:"To Pimp a Butterfly"},
{artist:"Phoebe Bridgers",album:"Punisher"},
{artist:"The Strokes",album:"Is This It"},
{artist:"Amy Winehouse",album:"Back To Black"}

];

let currentAlbum;

async function getCover(artist,album){

const query = encodeURIComponent(
artist + " " + album
);

const response = await fetch(
`https://itunes.apple.com/search?term=${query}&entity=album&limit=1`
);

const data = await response.json();

if(data.results.length===0){

return null;

}

return data.results[0]
.artworkUrl100
.replace(
"100x100bb",
"1000x1000bb"
);

}

async function loadAlbum(){

document.getElementById(
"result"
).innerText="";

document.getElementById(
"guess"
).value="";

currentAlbum =
albums[
Math.floor(
Math.random()*albums.length
)
];

const cover =
await getCover(
currentAlbum.artist,
currentAlbum.album
);

if(cover){

document.getElementById(
"cover"
).src=cover;

}else{

document.getElementById(
"result"
).innerText=
"couldn't load cover";

}

}

function checkGuess(){

const guess =
document.getElementById(
"guess"
).value
.trim()
.toLowerCase();

if(
guess===
currentAlbum.album
.toLowerCase()
){

document.getElementById(
"result"
).innerText=
"correct ✓";

setTimeout(
loadAlbum,
1500
);

}else{

document.getElementById(
"result"
).innerText=
`wrong — ${currentAlbum.album}`;

setTimeout(
loadAlbum,
2000
);

}

}

loadAlbum();

</script>

</body>

</html>
