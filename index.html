.clues{display:flex;flex-direction:column;}

.clue-n{color:#aaa;min-width:52px;font-size:10px;letter-spacing:0.12em;padding-top:2px;flex-shrink:0;}
.clue-v{font-style:italic;}
.clue-locked{color:#ccc;font-style:normal;font-size:11px;letter-spacing:0.06em;}
.ticks-row{display:flex;justify-content:space-between;align-items:center;}
.ticks{display:flex;gap:6px;}
.tick{width:13px;height:13px;border:1px solid #000;flex-shrink:0;}
.tick.hit{background:#000;}
.tick.miss{background:#000;opacity:0.2;}
.tick.skip{border-style:dashed;}
.skip-btn{font-family:'Courier Prime',monospace;font-size:11px;color:#aaa;background:none;border:none;cursor:pointer;letter-spacing:0.12em;text-decoration:underline;text-underline-offset:3px;padding:0;transition:color 0.15s;}
.skip-btn:hover{color:#000;}
.skip-btn:disabled{color:#ddd;cursor:not-allowed;text-decoration:none;}
.input-wrap{position:relative;width:100%;}
.input-row{display:flex;border:1px solid #000;}
#guessInput{flex:1;background:#fff;border:none;padding:12px 15px;font-family:'Courier Prime',monospace;font-size:14px;color:#000;outline:none;min-width:0;}
#guessInput::placeholder{color:#bbb;font-style:italic;}
#guessInput:disabled{background:#fafafa;cursor:not-allowed;}
.sub-btn{background:#000;color:#fff;border:none;padding:12px 20px;font-family:'Courier Prime',monospace;font-size:13px;letter-spacing:0.08em;cursor:pointer;white-space:nowrap;transition:opacity 0.15s;flex-shrink:0;}
.sub-btn:hover{opacity:0.75;}
.sub-btn:disabled{background:#ccc;cursor:not-allowed;opacity:1;}
.ac-drop{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #000;border-top:none;z-index:50;max-height:220px;overflow-y:auto;}
.ac-item{padding:9px 15px;font-size:13px;cursor:pointer;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:baseline;gap:10px;}
.ac-item:last-child{border-bottom:none;}
.ac-item:hover,.ac-item.hi{background:#f5f5f5;}
.ac-main{flex:1;}
.ac-sub{font-size:10px;color:#aaa;letter-spacing:0.06em;flex-shrink:0;}
.ac-type{font-size:9px;color:#ccc;letter-spacing:0.1em;text-transform:uppercase;flex-shrink:0;}
.history{display:flex;flex-direction:column;}
.h-row{display:flex;align-items:baseline;gap:10px;padding:7px 0;border-top:1px solid #eee;font-size:13px;animation:fu 0.2s ease;}
.h-row:last-child{border-bottom:1px solid #eee;}
.h-n{color:#bbb;min-width:20px;font-size:10px;flex-shrink:0;}
.h-t{flex:1;}
.h-t.sk{color:#bbb;font-style:italic;}
.h-m{font-size:12px;flex-shrink:0;}
.h-m.ok{color:#000;}
.h-m.no{color:#ccc;}
@keyframes fu{from{opacity:0;transform:translateY(-3px);}to{opacity:1;transform:translateY(0);}}
.result{display:none;flex-direction:column;gap:1.2rem;padding:1.4rem;border:1px solid #000;}
.result.show{display:flex;animation:fu 0.35s ease;}
.res-hed{font-size:20px;font-style:italic;letter-spacing:0.02em;line-height:1.2;}
.answer-block{display:flex;gap:16px;align-items:center;}
.ans-thumb{width:72px;height:72px;object-fit:cover;border:1px solid #ddd;flex-shrink:0;background:#f0f0f0;}
.ans-artist{font-size:15px;font-weight:700;}
.ans-album{font-size:12px;color:#666;margin-top:4px;font-style:italic;}
.ans-year{font-size:11px;color:#aaa;margin-top:3px;letter-spacing:0.08em;}
.copy-btn{align-self:flex-start;font-family:'Courier Prime',monospace;font-size:11px;color:#000;background:none;border:1px solid #000;padding:7px 15px;cursor:pointer;letter-spacing:0.1em;transition:background 0.15s,color 0.15s;}
.copy-btn:hover{background:#000;color:#fff;}
.timer{font-size:11px;color:#aaa;letter-spacing:0.08em;}
.timer b{color:#000;}
.footer{font-size:10px;color:#ccc;letter-spacing:0.12em;display:flex;gap:2rem;flex-wrap:wrap;}
.error-banner{display:none;font-size:11px;color:#999;font-style:italic;letter-spacing:0.06em;}
@media(max-width:480px){body{padding:2rem 1rem 5rem;}.sub-btn{padding:12px 14px;}}
</style>

// ── Seeded RNG & daily picker ──────────────────────────────────────────────
function seededRng(seed){let s=seed;return()=>{s=(s*1664525+1013904223)&0xffffffff;return(s>>>0)/0xffffffff;};}

function seededShuffle(arr,seed){
  const a=[...arr];const rand=seededRng(seed);
  for(let i=a.length-1;i>0;i--){const j=Math.floor(rand()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function noConsecutiveArtist(albums){
  const result=[];const remaining=[...albums];
  while(remaining.length>0){
    const lastArtist=result.length>0?result[result.length-1].artist:null;
    const idx=remaining.findIndex(a=>a.artist!==lastArtist);
    if(idx===-1){result.push(...remaining);break;}
    result.push(remaining.splice(idx,1)[0]);
  }
  return result;
}

function getDayIdx(){
  const now=new Date();
  const utcNow=Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate());
  const epoch=Date.UTC(2024,0,1);
  return Math.floor((utcNow-epoch)/86400000);
}

function getDailyAlbum(){
  const SHUFFLE_SEED=20250101;
  const shuffled=seededShuffle(ALBUMS,SHUFFLE_SEED);
  const ordered=noConsecutiveArtist(shuffled);
  const day=getDayIdx();
  return{album:ordered[day%ordered.length],idx:day%ordered.length};
}

// ── Cover art ──────────────────────────────────────────────────────────────
async function fetchCoverArt(artist,album){
  const query=encodeURIComponent(artist+' '+album);
  const url='https://itunes.apple.com/search?term='+query+'&entity=album&limit=10';
  try{
    const res=await fetch(url);if(!res.ok)return null;
    const data=await res.json();if(!data.results||!data.results.length)return null;
    const norm=s=>s.toLowerCase().replace(/[^a-z0-9]/g,'');
    const na=norm(artist),nb=norm(album);
    let best=null,bestScore=-1;
    for(const r of data.results){
      const ra=norm(r.artistName||''),rb=norm(r.collectionName||'');
      const artistMatch=ra===na||(ra.includes(na)&&na.length>3)||(na.includes(ra)&&ra.length>3);
      if(!artistMatch)continue;
      let score=0;
      if(ra===na)score+=4;else score+=1;
      if(rb===nb)score+=4;
      else if(rb.includes(nb)&&nb.length>3)score+=2;
      else if(nb.includes(rb)&&rb.length>3)score+=1;
      if(score>bestScore){bestScore=score;best=r;}
    }
    if(!best||!best.artworkUrl100)return null;
    return best.artworkUrl100.replace('100x100bb','600x600bb');
  }catch(e){return null;}
}

// ── Canvas / crop ──────────────────────────────────────────────────────────
const gc=document.getElementById('gameCanvas'),gx=gc.getContext('2d');

function getCropParams(ai,di){
  // fallback seeded crop — used until smart crop is ready
  const rng=seededRng(di*137+ai*31);
  const scale=6.5;const maxOff=1-1/scale;
  return{ox:rng()*maxOff,oy:rng()*maxOff,scale};
}

function findBestCrop(img, dayIdx, albumIdx){
  // Pure seeded RNG — no pixel analysis, guaranteed identical for everyone
  const rng=seededRng(dayIdx*137+albumIdx*31+9999);
  const GRID=8;
  const CROP_FRAC=1/6.5;
  const maxOff=1-CROP_FRAC;
  // Pick a random tile from the middle of the grid (avoid edges which are often plain)
  const tx=1+Math.floor(rng()*( GRID-2));
  const ty=1+Math.floor(rng()*(GRID-2));
  const ox=Math.min((tx/GRID)/maxOff,1)*maxOff;
  const oy=Math.min((ty/GRID)/maxOff,1)*maxOff;
  return{ox,oy,scale:6.5};
}

function drawCrop(img,ox,oy,scale){
  const W=gc.width,H=gc.height;
  const srcW=img.naturalWidth,srcH=img.naturalHeight;
  const size=Math.min(srcW,srcH);
  const sw=size/scale,sh=size/scale;
  const baseX=(srcW-size)/2,baseY=(srcH-size)/2;
  const sx=baseX+ox*(size-sw),sy=baseY+oy*(size-sh);
  gx.clearRect(0,0,W,H);gx.drawImage(img,sx,sy,sw,sh,0,0,W,H);
}

function drawFull(img){
  const W=gc.width,H=gc.height;
  const srcW=img.naturalWidth,srcH=img.naturalHeight;
  const size=Math.min(srcW,srcH);
  const ox=(srcW-size)/2,oy=(srcH-size)/2;
  gx.clearRect(0,0,W,H);gx.drawImage(img,ox,oy,size,size,0,0,W,H);
}

// ── Game state ─────────────────────────────────────────────────────────────
let G={},loadedImg=null;

async function init(){
  const day=getDayIdx();
  const{album,idx}=getDailyAlbum();
  // Don't set a crop yet — wait for smart crop analysis after image loads
  G={album,idx,day,crop:null,guesses:[],done:false,won:false};
  renderTicks();renderClues();startCountdown();
  document.getElementById('loadingMsg').style.display='flex';
  const url=await fetchCoverArt(album.artist,album.album);
  document.getElementById('loadingMsg').style.display='none';
  if(url){
    const img=new Image();img.crossOrigin='anonymous';
    img.onload=()=>{
      loadedImg=img;
      // Smart crop runs once, result stored — consistent per day for all users
      const smartCrop=findBestCrop(img,G.day,G.idx);
      G.crop=smartCrop;
      drawCrop(loadedImg,G.crop.ox,G.crop.oy,G.crop.scale);
      enable();
    };
    img.onerror=()=>{showErr("couldn't load cover — play with clues only.");enable();};
    img.src=url;
  }else{showErr("cover art unavailable today.");enable();}
}

function enable(){
  document.getElementById('guessInput').disabled=false;
  document.getElementById('subBtn').disabled=false;
  document.getElementById('skipBtn').disabled=false;
}

function showErr(msg){const el=document.getElementById('errorBanner');el.textContent=msg;el.style.display='block';}

function renderTicks(){
  const el=document.getElementById('ticks');el.innerHTML='';
  for(let i=0;i<6;i++){
    const d=document.createElement('div');d.className='tick';
    if(i<G.guesses.length){const g=G.guesses[i];d.classList.add(g.correct?'hit':g.skip?'skip':'miss');}
    el.appendChild(d);
  }
}

function renderClues(){
  const el=document.getElementById('clues');el.innerHTML='';
  const wrong=G.guesses.filter(g=>!g.correct).length;
  [1,3,5].forEach((unlock,i)=>{
    const row=document.createElement('div');row.className='clue-row';
    const n=document.createElement('div');n.className='clue-n';n.textContent=i===2?'lyric':'clue '+(i+1);
    const v=document.createElement('div');
    if(wrong>=unlock||G.done){v.className='clue-v';v.textContent=G.album.clues[i];}
    else{v.className='clue-locked';v.textContent='after '+unlock+' wrong';}
    row.appendChild(n);row.appendChild(v);el.appendChild(row);
  });
}

function revealMore(){
  if(!loadedImg)return;
  const wrong=G.guesses.filter(g=>!g.correct).length;
  // Scale down more aggressively at the end — last clue shows ~40% of image
  let newScale;
  if(wrong>=5){
    newScale=3.5; // last clue: quite zoomed out, ~55% of image visible
  } else {
    newScale=Math.max(G.crop.scale*0.65,G.crop.scale-(wrong*(G.crop.scale*0.38)/4));
  }
  drawCrop(loadedImg,G.crop.ox,G.crop.oy,newScale);
}

function norm(s){return s.toLowerCase().replace(/[^a-z0-9]/g,'');}

function checkGuess(g){
  const ng=norm(g);
  const na=norm(G.album.artist);
  const nb=norm(G.album.album);
  const matchArtist=ng===na||(na.includes(ng)&&ng.length>4);
  const matchAlbum=ng===nb||(nb.includes(ng)&&ng.length>3);
  return{correct:matchArtist||matchAlbum,matchArtist,matchAlbum};
}

function submit(text){
  if(G.done||!text.trim())return;
  const{correct,matchArtist,matchAlbum}=checkGuess(text.trim());
  G.guesses.push({text:text.trim(),correct,skip:false});
  addRow(text.trim(),correct,false,matchArtist,matchAlbum);
  renderTicks();renderClues();
  if(!correct)revealMore();
  if(correct){G.done=true;G.won=true;endGame(true);}
  else if(G.guesses.length>=6){G.done=true;endGame(false);}
  document.getElementById('guessInput').value='';hideAC();
}

function skip(){
  if(G.done)return;
  G.guesses.push({text:'—',correct:false,skip:true});
  addRow('—',false,true,false,false);renderTicks();renderClues();revealMore();
  if(G.guesses.length>=6){G.done=true;endGame(false);}
}

function addRow(text,correct,skip,matchArtist,matchAlbum){
  const el=document.getElementById('history');
  const row=document.createElement('div');row.className='h-row';
  let tag='';
  if(correct){
    if(matchArtist&&matchAlbum)tag='artist + album';
    else if(matchArtist)tag='artist';
    else tag='album';
  }
  const labelHtml=correct?'<span style="font-size:9px;color:#aaa;letter-spacing:0.1em;text-transform:uppercase;margin-left:6px">'+tag+'</span>':'';
  row.innerHTML='<span class="h-n">'+G.guesses.length+'.</span>'
    +'<span class="h-t'+(skip?' sk':'')+'">'+text+labelHtml+'</span>'
    +'<span class="h-m '+(correct?'ok':'no')+'">'+(correct?'✓':skip?'–':'✗')+'</span>';
  el.appendChild(row);
}

function endGame(won){
  if(loadedImg)drawFull(loadedImg);
  document.getElementById('resHed').textContent=won?'got it.':'not this time.';
  document.getElementById('ansArtist').textContent=G.album.artist;
  document.getElementById('ansAlbum').textContent=G.album.album;
  document.getElementById('ansYear').textContent=G.album.year;
  if(loadedImg)document.getElementById('ansThumb').src=loadedImg.src;
  document.getElementById('result').classList.add('show');
  document.getElementById('guessInput').disabled=true;
  document.getElementById('subBtn').disabled=true;
  document.getElementById('skipBtn').disabled=true;
  saveStreak(won);
  if(won)burstStars();
}

function burstStars(){
  const canvas=document.createElement('canvas');
  canvas.style.cssText='position:fixed;inset:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
  canvas.width=window.innerWidth;canvas.height=window.innerHeight;
  document.body.appendChild(canvas);
  const ctx=canvas.getContext('2d');
  function drawHandStar(ctx,x,y,size,rot,seed){
    const pts=5;
    const rng=(n)=>{let s=(seed*9301+n*49297)%233280;return s/233280;};
    ctx.save();ctx.translate(x,y);ctx.rotate(rot);ctx.beginPath();
    const coords=[];
    for(let i=0;i<pts*2;i++){
      const outer=i%2===0;
      const baseR=outer?size*(0.82+rng(i)*0.22):size*(0.14+rng(i+7)*0.10);
      const baseA=(Math.PI/pts)*i-Math.PI/2;
      const wobbleA=baseA+(outer?(rng(i+3)-0.5)*0.22:(rng(i+5)-0.5)*0.35);
      const wobbleR=baseR*(0.86+rng(i+11)*0.28);
      coords.push([Math.cos(wobbleA)*wobbleR,Math.sin(wobbleA)*wobbleR]);
    }
    ctx.moveTo(coords[0][0],coords[0][1]);
    for(let i=1;i<=coords.length;i++){
      const[x1,y1]=coords[i%coords.length];
      const[px,py]=coords[i-1];
      const mx=(px+x1)/2+(rng(i*17)-0.5)*size*0.07;
      const my=(py+y1)/2+(rng(i*13)-0.5)*size*0.07;
      ctx.quadraticCurveTo(mx,my,x1,y1);
    }
    ctx.closePath();ctx.restore();
  }
  const stars=[];
  for(let i=0;i<34;i++){
    stars.push({
      x:Math.random()*canvas.width,y:-40-Math.random()*canvas.height*0.5,
      vx:(Math.random()-0.5)*0.8,vy:2.5+Math.random()*3.5,
      size:28+Math.random()*44,alpha:0,alphaDelay:i*3,
      rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.03,
      seed:Math.floor(Math.random()*9999),
    });
  }
  let frame=0;
  function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);let alive=false;
    for(const s of stars){
      if(frame<s.alphaDelay)continue;
      s.alpha=Math.min(1,(frame-s.alphaDelay)*0.08);
      s.x+=s.vx;s.y+=s.vy;s.rot+=s.rotSpeed;
      if(s.y>canvas.height+60)s.alpha=0;
      if(s.alpha<=0&&frame>s.alphaDelay+10)continue;
      alive=true;
      ctx.save();ctx.globalAlpha=Math.max(0,s.alpha);
      ctx.strokeStyle='#000';ctx.lineWidth=2.2;ctx.lineJoin='round';ctx.lineCap='round';
      drawHandStar(ctx,s.x,s.y,s.size,s.rot,s.seed);ctx.stroke();ctx.restore();
    }
    frame++;if(frame<400)requestAnimationFrame(animate);else canvas.remove();
  }
  animate();
}

function saveStreak(won){
  const last=parseInt(localStorage.getItem('gta_lastday')||'-1');
  const today=G.day;
  let streak=parseInt(localStorage.getItem('gta_streak')||'0');
  if(won){if(last===today-1)streak++;else if(last!==today)streak=1;}
  else{if(last!==today)streak=0;}
  localStorage.setItem('gta_streak',streak);
  localStorage.setItem('gta_lastday',today);
}

document.getElementById('copyBtn').addEventListener('click',()=>{
  const s=G.guesses.map(g=>g.correct?'■':g.skip?'□':'▪').join(' ');
  const result=G.won?G.guesses.length+'/6':'x/6';
  const text='what the album? #'+G.day+'\n'+G.album.artist+' — '+G.album.album+'\n'+result+' '+s;
  navigator.clipboard.writeText(text).then(()=>{
    const btn=document.getElementById('copyBtn');
    btn.textContent='copied.';
    setTimeout(()=>btn.textContent='copy result',1500);
  });
});

// ── Autocomplete ───────────────────────────────────────────────────────────
const acItems=[
  ...[...new Set(ALBUMS.map(a=>a.artist))].map(artist=>{
    const abs=ALBUMS.filter(a=>a.artist===artist).map(a=>a.album);
    return{label:artist,sub:abs.slice(0,2).join(', '),val:artist,type:'artist'};
  }),
  ...ALBUMS.map(a=>({label:a.album,sub:a.artist,val:a.album,type:'album'}))
];

document.getElementById('guessInput').addEventListener('input',e=>{
  const q=e.target.value.trim().toLowerCase();
  if(q.length<2){hideAC();return;}
  const matches=acItems.filter(n=>n.label.toLowerCase().includes(q)).slice(0,7);
  if(!matches.length){hideAC();return;}
  showAC(matches);
});

function showAC(items){
  const drop=document.getElementById('acDrop');drop.innerHTML='';
  items.forEach(item=>{
    const d=document.createElement('div');d.className='ac-item';d.dataset.v=item.val;
    d.innerHTML='<span class="ac-main">'+item.label+'</span>'
      +'<span class="ac-sub">'+item.sub+'</span>'
      +'<span class="ac-type">'+item.type+'</span>';
    d.addEventListener('mousedown',()=>{document.getElementById('guessInput').value=item.val;hideAC();submit(item.val);});
    drop.appendChild(d);
  });
  drop.style.display='block';
}

function hideAC(){document.getElementById('acDrop').style.display='none';}
function moveAC(dir){
  const items=document.querySelectorAll('.ac-item');if(!items.length)return;
  let c=Array.from(items).findIndex(i=>i.classList.contains('hi'));
  if(c>=0)items[c].classList.remove('hi');
  c=(c+dir+items.length)%items.length;
  items[c].classList.add('hi');
  document.getElementById('guessInput').value=items[c].dataset.v;
}

document.getElementById('guessInput').addEventListener('keydown',e=>{
  if(e.key==='Enter'){const a=document.querySelector('.ac-item.hi');if(a){document.getElementById('guessInput').value=a.dataset.v;hideAC();}else submit(document.getElementById('guessInput').value);}
  if(e.key==='ArrowDown'){moveAC(1);e.preventDefault();}
  if(e.key==='ArrowUp'){moveAC(-1);e.preventDefault();}
  if(e.key==='Escape')hideAC();
});

document.getElementById('subBtn').addEventListener('click',()=>submit(document.getElementById('guessInput').value));
document.getElementById('skipBtn').addEventListener('click',skip);

function startCountdown(){
  const u=()=>{
    const now=new Date(),mid=new Date(now);mid.setHours(24,0,0,0);
    const d=mid-now;
    const h=String(Math.floor(d/3600000)).padStart(2,'0');
    const m=String(Math.floor((d%3600000)/60000)).padStart(2,'0');
    const s=String(Math.floor((d%60000)/1000)).padStart(2,'0');
    document.getElementById('countdown').textContent=h+':'+m+':'+s;
  };u();setInterval(u,1000);
}

init();
</script>
