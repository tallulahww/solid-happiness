<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>guess the album.</title>

<style>
body {
  margin: 0;
  background: #f7f7f5;
  color: #111;
  font-family: "Courier New", monospace;
}

.page {
  max-width: 980px;
  margin: 70px auto;
  padding: 0 28px;
}

h1 {
  font-size: 26px;
  letter-spacing: 10px;
  font-weight: 700;
  margin-bottom: 80px;
}

.cover-wrap {
  width: min(80vw, 780px);
  aspect-ratio: 1 / 1;
  border: 2px solid #111;
  background: #eee;
  display: flex;
  align-items: center;
  justify-content: center;
}

canvas {
  width: 100%;
  height: 100%;
  image-rendering: auto;
}

.status {
  margin-top: 45px;
  color: #999;
  font-style: italic;
  font-weight: bold;
  letter-spacing: 5px;
}

.controls {
  margin-top: 35px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}

input, button {
  font-family: "Courier New", monospace;
  font-size: 16px;
  padding: 12px 14px;
  border: 1px solid #111;
  background: #f7f7f5;
}

input {
  width: min(500px, 80vw);
}

button {
  cursor: pointer;
}

.result {
  margin-top: 25px;
  font-style: italic;
  letter-spacing: 2px;
}

.clue {
  margin-top: 20px;
  color: #555;
  letter-spacing: 2px;
}
</style>
</head>

<body>
<div class="page">
  <h1>guess the album.</h1>

  <div class="cover-wrap">
    <canvas id="canvas" width="800" height="800"></canvas>
  </div>

  <div id="status" class="status">loading cover art...</div>

  <div class="controls">
    <input id="guess" placeholder="type album title..." />
    <button onclick="checkGuess()">guess</button>
    <button onclick="newRound()">new one</button>
    <button onclick="showClue()">clue</button>
  </div>

  <div id="clue" class="clue"></div>
  <div id="result" class="result"></div>
</div>

let currentAlbum = null;
let clueCount = 0;

function clean(text) {
  return text.toLowerCase().replace(/[^a-z0-9]/g, "");
}

async function fetchCoverArt(artist, album) {
  const query = encodeURIComponent(`${artist} ${album}`);
  const response = await fetch(`https://itunes.apple.com/search?term=${query}&entity=album&limit=5`);
  const data = await response.json();

  if (!data.results || !data.results.length) return null;

  const best = data.results[0];
  return best.artworkUrl100.replace("100x100bb", "1000x1000bb");
}

function drawTinyCrop(url) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.crossOrigin = "anonymous";

    img.onload = () => {
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      const cropSize = Math.floor(img.width / 8); 
      const x = Math.floor(Math.random() * (img.width - cropSize));
      const y = Math.floor(Math.random() * (img.height - cropSize));

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.imageSmoothingEnabled = true;

      ctx.drawImage(
        img,
        x,
        y,
        cropSize,
        cropSize,
        0,
        0,
        canvas.width,
        canvas.height
      );

      resolve();
    };

    img.onerror = reject;
    img.src = url;
  });
}

async function newRound() {
  document.getElementById("status").textContent = "loading cover art...";
  document.getElementById("result").textContent = "";
  document.getElementById("clue").textContent = "";
  document.getElementById("guess").value = "";
  clueCount = 0;

  currentAlbum = albums[Math.floor(Math.random() * albums.length)];

  try {
    const cover = await fetchCoverArt(currentAlbum.artist, currentAlbum.album);

    if (!cover) throw new Error("No cover found");

    await drawTinyCrop(cover);

    document.getElementById("status").textContent =
      "tiny piece of the cover. guess the album.";
  } catch (error) {
    console.error(error);
    document.getElementById("status").textContent =
      "cover art unavailable today. try another.";
  }
}

function checkGuess() {
  const guess = clean(document.getElementById("guess").value);
  const answer = clean(currentAlbum.album);

  if (!guess) return;

  if (guess === answer) {
    document.getElementById("result").textContent =
      `correct. ${currentAlbum.album} — ${currentAlbum.artist}`;
  } else {
    document.getElementById("result").textContent =
      "not quite. try again.";
  }
}

function showClue() {
  clueCount++;

  if (clueCount === 1) {
    document.getElementById("clue").textContent =
      `artist: ${currentAlbum.artist}`;
  } else if (clueCount === 2) {
    document.getElementById("clue").textContent =
      `year: ${currentAlbum.year}`;
  } else {
    document.getElementById("clue").textContent =
      `answer: ${currentAlbum.album}`;
  }
}

document.getElementById("guess").addEventListener("keydown", function(e) {
  if (e.key === "Enter") checkGuess();
});

newRound();
</script>
